<!DOCTYPE html>
<html>
<head>
    <title>Government Redaction</title>

    <style>
        body { margin:0; font-family:"Segoe UI"; background:#f4f6f9; }

        .navbar {
            background:#7c2d12;
            color:white;
            padding:15px 30px;
            display:flex;
            justify-content:space-between;
        }

        .navbar a { color:white; text-decoration:none; }

        .container {
            display:flex;
            justify-content:center;
            margin-top:40px;
        }

        .card {
            background:white;
            width:500px;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
            text-align:center;
        }

        .upload-box {
            border:2px dashed #ea580c;
            padding:30px;
            border-radius:10px;
            background:#fff7ed;
            cursor:pointer;
        }

        input[type=file] { display:none; }

        .btn {
            margin-top:20px;
            background:#7c2d12;
            color:white;
            padding:12px 25px;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        .btn:hover { background:#ea580c; }

        .info {
            margin-top:20px;
            text-align:left;
            font-size:14px;
            background:#f9fafb;
            padding:15px;
            border-radius:10px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div>📜 Government Redaction Module</div>
    <a href="/">⬅ Back</a>
</div>

<div class="container">
    <div class="card">

        <h2>Government Document Security</h2>
        <p style="color:gray;">Protect citizen and official records</p>

        <form action="/upload/government" method="post" enctype="multipart/form-data">

            <label class="upload-box">
                📂 Upload Government Documents
                <input type="file" name="file" required>
            </label>

            <button class="btn">Process Securely</button>

        </form>

        <div class="info">
            <h4>🔒 Protected Data:</h4>
            • Aadhaar Number<br>
            • PAN Number<br>
            • Passport Number<br>
            • Addresses<br>
            • Citizen Details<br>
            • Official Records
        </div>

    </div>
</div>

</body>
</html>
